<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Dự Báo Thời Tiết</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="weather-container">
        <h2 class="app-title">Dự Báo Thời Tiết</h2>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Nhập tên thành phố (vd: Hanoi, Tokyo...)" autocomplete="off">
            <button id="searchBtn" onclick="getWeather()">Tìm kiếm</button>
        </div>
        
        <p id="validationMessage" class="error-text hidden">Vui lòng nhập tên thành phố hợp lệ!</p>
        <p id="errorMessage" class="error-text hidden">Không tìm thấy thành phố này. Vui lòng kiểm tra lại!</p>

        <div id="weatherResult" class="weather-card hidden">
            <div class="location-box">
                <h3 id="cityName">--</h3>
                <p id="countryName" class="country">--</p>
            </div>
            
            <div class="main-info">
                <img id="weatherIcon" src="" alt="Thời tiết" class="weather-icon hidden">
                <h1 id="temperature">--°C</h1>
                <p id="description">--</p>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <span class="label">Độ ẩm</span>
                    <span id="humidity" class="value">--%</span>
                </div>
                <div class="detail-item">
                    <span class="label">Sức gió</span>
                    <span id="wind" class="value">-- km/h</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
